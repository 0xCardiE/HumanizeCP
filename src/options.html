<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Humanize Copy — Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>Humanize Copy</h1>
        <p>
          Right-click selected text and choose <strong>Copy &amp; Humanize</strong>.
        </p>
        <p id="permission-status"></p>
        <button id="grant-access" type="button" hidden>Allow on all websites</button>
      </header>

      <section>
        <h2>Preview</h2>
        <textarea id="preview-input" rows="14" spellcheck="false">In today's fast-paced digital landscape, many people believe AI will replace humans completely—but the reality is far more nuanced!! But here's the thing: we need to delve into this landscape and leverage the real unlock.

Hot take: It's not just a tool. It's also a partner. Not only a helper, but also a collaborator. That's the real unlock. No hype. No noise. Just results.

Here's why that matters: teams must navigate the digital landscape, foster a tapestry of ideas, and empower users to utilize robust, seamless workflows. The result?? And honestly? As the world continues to evolve, this shift is crucial.

Nestled in the heart of the region, the town serves as a vibrant hub and boasts a diverse array of traditions. It is a testament to enduring heritage, marking a pivotal moment in the evolving landscape. Additionally, the cuisine draws from a rich tapestry of influences, offering valuable insights and showcasing intricate interplay between cultures.

It's not a mirror, it's a portal. Simply put, she opened the ancient book—its pages brittle and yellowed—and discovered a map that would change her life forever.</textarea>
        <output id="preview-output" aria-live="polite"></output>
      </section>

      <section>
        <h2>Cleanup rules</h2>
        <form id="settings-form">
          <ul id="rules-list"></ul>
        </form>
      </section>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
